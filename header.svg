<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1200 220">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="40%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#headerGrad)"/>

  <!-- Subtle grid dots decoration -->
  <g opacity="0.05" fill="#58a6ff">
    <circle cx="50" cy="30" r="1.5"/><circle cx="100" cy="30" r="1.5"/><circle cx="150" cy="30" r="1.5"/>
    <circle cx="200" cy="30" r="1.5"/><circle cx="250" cy="30" r="1.5"/><circle cx="300" cy="30" r="1.5"/>
    <circle cx="50" cy="60" r="1.5"/><circle cx="100" cy="60" r="1.5"/><circle cx="150" cy="60" r="1.5"/>
    <circle cx="200" cy="60" r="1.5"/><circle cx="250" cy="60" r="1.5"/><circle cx="300" cy="60" r="1.5"/>
    <circle cx="900" cy="30" r="1.5"/><circle cx="950" cy="30" r="1.5"/><circle cx="1000" cy="30" r="1.5"/>
    <circle cx="1050" cy="30" r="1.5"/><circle cx="1100" cy="30" r="1.5"/><circle cx="1150" cy="30" r="1.5"/>
    <circle cx="900" cy="60" r="1.5"/><circle cx="950" cy="60" r="1.5"/><circle cx="1000" cy="60" r="1.5"/>
    <circle cx="1050" cy="60" r="1.5"/><circle cx="1100" cy="60" r="1.5"/><circle cx="1150" cy="60" r="1.5"/>
  </g>

  <!-- Animated wave layer 1 -->
  <path fill="url(#waveGrad1)" opacity="0.4">
    <animate attributeName="d" dur="20s" repeatCount="indefinite"
      values="M0 160Q300 200 600 170T1200 185L1200 220L0 220Z;M0 180Q300 150 600 165T1200 170L1200 220L0 220Z;M0 170Q300 195 600 180T1200 160L1200 220L0 220Z;M0 160Q300 200 600 170T1200 185L1200 220L0 220Z"/>
  </path>

  <!-- Animated wave layer 2 -->
  <path fill="url(#waveGrad2)" opacity="0.35">
    <animate attributeName="d" dur="15s" repeatCount="indefinite" begin="-5s"
      values="M0 175Q300 210 600 185T1200 195L1200 220L0 220Z;M0 195Q300 165 600 180T1200 185L1200 220L0 220Z;M0 185Q300 200 600 190T1200 175L1200 220L0 220Z;M0 175Q300 210 600 185T1200 195L1200 220L0 220Z"/>
  </path>

  <!-- Accent line -->
  <line x1="480" y1="148" x2="720" y2="148" stroke="#58a6ff" stroke-width="2" opacity="0" stroke-linecap="round">
    <animate attributeName="opacity" from="0" to="0.4" dur="1.5s" begin="0.8s" fill="freeze"/>
  </line>

  <!-- Title text -->
  <text x="600" y="82" text-anchor="middle" dominant-baseline="middle"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif,Apple Color Emoji,Segoe UI Emoji"
    font-size="60" font-weight="700" fill="#58a6ff" opacity="0">
    Antony Melvin
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" fill="freeze"/>
  </text>

  <!-- Subtitle text -->
  <text x="600" y="130" text-anchor="middle" dominant-baseline="middle"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif,Apple Color Emoji,Segoe UI Emoji"
    font-size="20" font-weight="500" fill="#8b949e" opacity="0">
    CSE Student | Full-Stack &amp; Mobile Developer
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="0.3s" fill="freeze"/>
  </text>
</svg>
