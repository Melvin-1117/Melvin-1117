<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1200 120">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="60%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Wave layer 1 — smooth spline easing -->
  <path fill="url(#footerGrad)">
    <animate attributeName="d" dur="30s" repeatCount="indefinite"
      calcMode="spline"
      keyTimes="0;0.5;1"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1"
      values="M0 35Q300 5 600 30Q900 55 1200 20L1200 120L0 120Z;M0 20Q300 50 600 25Q900 5 1200 40L1200 120L0 120Z;M0 35Q300 5 600 30Q900 55 1200 20L1200 120L0 120Z"/>
  </path>

  <!-- Wave layer 2 — offset timing -->
  <path fill="url(#footerGrad)" opacity="0.5">
    <animate attributeName="d" dur="25s" repeatCount="indefinite" begin="-12s"
      calcMode="spline"
      keyTimes="0;0.5;1"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1"
      values="M0 45Q300 15 600 40Q900 65 1200 30L1200 120L0 120Z;M0 30Q300 55 600 35Q900 10 1200 50L1200 120L0 120Z;M0 45Q300 15 600 40Q900 65 1200 30L1200 120L0 120Z"/>
  </path>
</svg>
