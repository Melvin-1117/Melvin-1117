      values="M0 50Q300 15 600 40T1200 30L1200 120L0 120Z;M0 30Q300 55 600 35T1200 50L1200 120L0 120Z;M0 45Q300 20 600 45T1200 25L1200 120L0 120Z;M0 50Q300 15 600 40T1200 30L1200 120L0 120Z"/>
